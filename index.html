
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#7c3aed">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'custom-bg': '#f8fafc',          // GLOBAL_BACKGROUND
              'custom-surface': '#ffffff',     // SURFACE_CARDS
              'custom-border': '#cbd5e1',      // MUTED_BORDER
              'custom-text-primary': '#000000', // TEXT_PRIMARY
              'custom-text-muted': '#64748b',   // TEXT_MUTED
              'custom-purple': '#6d28d9',      // PRIMARY_ACTION
              'custom-teal': '#0f766e',        // ACCENT_SUCCESS
              'custom-crimson': '#dc2626',     // ACCENT_DANGER
              'custom-amber': '#b45309',       // ACCENT_WARNING
              'custom-navy': '#1e293b',        // BRAND_NAVY
            }
          }
        }
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .glass-purple {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(147, 51, 234, 0.2);
        }
        .shout-glow:focus-within {
            box-shadow: 0 0 25px rgba(147, 51, 234, 0.15);
        }
        /* Custom scrollbar for admin logs */
        .admin-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .admin-scroll::-webkit-scrollbar-track {
            background: #0f172a;
        }
        .admin-scroll::-webkit-scrollbar-thumb {
            background: #8B5CF6;
            border-radius: 10px;
        }

        /* --- BBCode Rendering Engine Styles (v5.0) --- */
        .bbcode-render {
            line-height: 1.7;
            letter-spacing: -0.01em;
            word-wrap: break-word;
            overflow-wrap: break-word;
            color: #334155; /* slate-700 */
            font-size: 14px;
        }
        .bbcode-render strong {
            color: #1e293b; /* slate-800 */
            font-weight: 800;
        }
        .bbcode-render blockquote {
            margin: 1.5rem 0;
            padding: 1.25rem 1.5rem;
            background-color: #f8fafc;
            border-left: 5px solid #7c3aed;
            border-radius: 0 1.25rem 1.25rem 0;
            font-style: italic;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.03);
            font-size: 0.95em;
            color: #475569;
        }
        .bbcode-render img {
            display: block;
            max-width: 100%;
            height: auto;
            border-radius: 1.5rem;
            margin: 1.75rem auto;
            box-shadow: 0 15px 25px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0,0,0,0.05);
        }
        .bbcode-render a {
            color: #7c3aed;
            font-weight: 700;
            text-decoration: none;
            border-bottom: 2px solid rgba(124, 58, 237, 0.15);
            transition: all 0.2s;
            word-break: break-all;
        }
        .bbcode-render a:hover {
            color: #6d28d9;
            border-bottom-color: #7c3aed;
            background: rgba(124, 58, 237, 0.05);
        }
        .bbcode-render .text-center {
            text-align: center;
        }
        /* Spacing for dynamic paragraphs and blocks */
        .bbcode-render .bb-para {
            margin-bottom: 1.25rem;
        }
        .bbcode-render .bb-para:last-child {
            margin-bottom: 0;
        }
        /* Handle empty lines correctly */
        .bbcode-render .h-4 {
            height: 1rem;
        }

        /* Dark container overrides for BBCode */
        .bbcode-render-dark {
            color: rgba(255, 255, 255, 0.8);
        }
        .bbcode-render-dark .bb-para {
            color: rgba(255, 255, 255, 0.8);
        }
        .bbcode-render-dark strong {
            color: rgba(255, 255, 255, 0.95);
            font-weight: 800;
        }
        .bbcode-render-dark blockquote {
            background-color: rgba(255, 255, 255, 0.03) !important;
            border-left: 5px solid #8b5cf6 !important;
            color: rgba(255, 255, 255, 0.6) !important;
        }
        .bbcode-render-dark a {
            color: #c084fc !important;
            border-bottom: 2px solid rgba(192, 132, 252, 0.3) !important;
        }
        .bbcode-render-dark a:hover {
            color: #d8b4fe !important;
            border-bottom-color: #c084fc !important;
            background: rgba(192, 132, 252, 0.1) !important;
        }

        /* Golden Coin Pulsing Effect */
        @keyframes coin-pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(250, 204, 21, 0.4); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(250, 204, 21, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(250, 204, 21, 0); }
        }
        .animate-coin-pop {
            animation: coin-pulse 2s infinite;
        }
    </style>
